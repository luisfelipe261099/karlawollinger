<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
.card {
    width: 1200px;
    height: 675px;
    background: linear-gradient(135deg, #3a5f85 0%, #5a82a8 40%, #7ba3c5 70%, #a8c4dc 100%);
    position: relative;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
}
.card::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
}
.pattern {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='20' cy='20' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
}
.content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    padding: 60px;
}
.logo-icon {
    margin-bottom: 30px;
}
.logo-icon svg {
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.2));
}
h1 {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: 12px;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
h2 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 16px;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 40px;
}
.tagline {
    font-size: 20px;
    font-weight: 400;
    opacity: 0.95;
    margin-bottom: 12px;
    letter-spacing: 1px;
}
.sub {
    font-size: 16px;
    opacity: 0.7;
    letter-spacing: 2px;
}
.bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.5), rgba(255,255,255,0.1));
}
.whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 30px;
    padding: 14px 36px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    font-size: 18px;
    color: white;
    letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="card">
    <div class="pattern"></div>
    <div class="content">
        <div class="logo-icon">
            <svg width="100" height="80" viewBox="0 0 120 100">
                <polygon points="45,8 85,78 5,78" fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                <polygon points="75,8 115,78 35,78" fill="rgba(255,255,255,0.7)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                <polygon points="60,8 85,78 35,78" fill="rgba(255,255,255,0.3)"/>
            </svg>
        </div>
        <h1>Karla Wollinger</h1>
        <h2>Representações</h2>
        <p class="tagline">Produtos de Limpeza e Higiene Direto da Indústria</p>
        <p class="sub">CURITIBA • REGIÃO METROPOLITANA • LITORAL DO PARANÁ</p>
        <div class="whatsapp">📱 (41) 98593-242</div>
    </div>
    <div class="bottom-bar"></div>
</div>
</body>
</html>
